services:
  db:
    image: postgres:16-alpine
    container_name: fullstack-db
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app_db']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: